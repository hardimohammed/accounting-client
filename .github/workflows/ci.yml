name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # No test files exist in this app yet (react-scripts test would
      # fail immediately with "No tests found" if run) — the build
      # itself is the meaningful gate for now. Add a test step here
      # once real tests exist.
      - name: Build
        run: npm run build
        env:
          # CRA treats ESLint warnings as build-breaking errors when
          # CI=true, which GitHub Actions sets for every job by
          # default. Several pre-existing warnings elsewhere in this
          # app (unused vars, missing hook deps) aren't part of this
          # gate yet — explicitly opt out rather than have the build
          # fail on a warning, not a real break.
          CI: false
